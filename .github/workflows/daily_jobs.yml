name: Daily Job Hunter 🔍

on:
  schedule:
    # Runs every day at 12:00 PM UTC (adjust if you want local CET: use 11:00 for CET, 10:00 for CEST)
    - cron: '0 11 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI anytime

jobs:
  hunt-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python job_scraper/main.py

      - name: Commit and push reports
        run: |
          git config --local user.email "job-hunter-bot@github-actions"
          git config --local user.name "Job Hunter Bot"
          git add output/reports/ docs/
          git diff --staged --quiet || git commit -m "📋 Daily job report - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
