name: Daily Job Hunter 🔍

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  hunt-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python job_scraper/main.py

      - name: Commit and push reports
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📋 Daily job report - ${{ github.run_number }}"
          file_pattern: "output/reports/* docs/*"
          commit_user_name: "Job Hunter Bot"
          commit_user_email: "job-hunter-bot@github-actions"
          push_options: "--force-with-lease"
