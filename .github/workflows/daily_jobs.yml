name: Daily Job Hunter 🔍

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  hunt-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        working-directory: ./job_scraper
        run: python main.py

      - name: Show generated files
        run: |
          echo "=== output/reports/ ==="
          ls -lah output/reports/ || echo "empty"
          echo "=== docs/ ==="
          ls -lah docs/ || echo "empty"

      - name: Commit and push reports
        run: |
          git config --local user.email "job-hunter-bot@github-actions"
          git config --local user.name "Job Hunter Bot"
          # Stage ONLY report files — never the workflow file
          git add output/reports/ docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "📋 Daily job report - $(date +'%Y-%m-%d %H:%M UTC')"
            # Pull remote changes then push
            git fetch origin main
            git rebase origin/main
            git push origin main
          fi
