name: Daily Job Hunter 🔍

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  hunt-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so rebase always works
          ref: main             # always check out the very latest main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python job_scraper/main.py

      - name: Commit and push reports
        run: |
          git config --local user.email "job-hunter-bot@github-actions"
          git config --local user.name "Job Hunter Bot"
          git add output/reports/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📋 Daily job report - $(date +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase=true origin main
            git push origin main
          fi
